version: "3.9"

services:
  # ─── PostgreSQL Database ────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-interview_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-interview_secret_2024}
      POSTGRES_DB: ${POSTGRES_DB:-interview_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-interview_user} -d ${POSTGRES_DB:-interview_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Node.js/Express Backend ────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-interview_user}:${POSTGRES_PASSWORD:-interview_secret_2024}@db:5432/${POSTGRES_DB:-interview_db}?schema=public
      ML_SERVICE_URL: http://ml-service:8000
      GROQ_API_KEY: ${GROQ_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 4000
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    networks:
      - frontend-net
      - backend
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Python ML Microservice ─────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: 1
      GROQ_API_KEY: ${GROQ_API_KEY}
      MODEL_CACHE_DIR: /app/models
    volumes:
      - ml_models:/app/models
    ports:
      - "${ML_PORT:-8000}:8000"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G

  # ─── Next.js Frontend ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - frontend-net
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  ml_models:
    driver: local

networks:
  frontend-net:
    driver: bridge
  backend:
    driver: bridge
