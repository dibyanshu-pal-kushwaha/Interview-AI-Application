version: "3.9"

services:
  backend:
    build:
      target: development
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
    command: npx tsx watch src/index.ts

  ml-service:
    build:
      target: development
    volumes:
      - ./ml-service:/app
      - /app/models
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      target: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
    command: npm run dev
